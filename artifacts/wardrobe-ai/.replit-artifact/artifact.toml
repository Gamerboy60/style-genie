kind = "web"
previewPath = "/"
title = "Wardrobe AI"
version = "1.0.0"
id = "artifacts/wardrobe-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22620

[services.development]
run = "pnpm --filter @workspace/wardrobe-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wardrobe-ai", "run", "build" ]
publicDir = "artifacts/wardrobe-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22620"
BASE_PATH = "/"
